services:
  # The Node.js Web Service
  - type: web
    name: vela-backend
    env: node
    region: oregon # or frankfurt, ohio, singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vela-database
          property: connectionString
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false # Requires manual entry in the Render Dashboard

databases:
  # The managed PostgreSQL database
  - name: vela-database
    region: oregon # should match web service region
    plan: free # or starter, standard
    postgresMajorVersion: 16
