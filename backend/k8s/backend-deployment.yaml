apiVersion: apps/v1
kind: Deployment
metadata:
  name: loviq-backend
  labels:
    app: loviq-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loviq-backend
  template:
    metadata:
      labels:
        app: loviq-backend
    spec:
      containers:
      - name: backend
        image: loviq-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
        env:
        - name: PORT
          value: "4000"
        - name: NODE_ENV
          value: "production"
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: DATABASE_URL
        - name: FIREBASE_SERVICE_ACCOUNT_JSON
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: FIREBASE_SERVICE_ACCOUNT_JSON
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 10
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"] # Let Kubernetes remove Pod from Service endpoint list before server gets SIGTERM
