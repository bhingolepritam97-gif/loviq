apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loviq-ingress
  annotations:
    # Essential NGINX annotations for WebSocket persistent connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: loviq-backend
            port:
              number: 80
